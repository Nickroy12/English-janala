<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="styles/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- <h1 class="text-xl font-bold underline">Something is cocking</h1> -->
     <header class="bg-cyan-100 ">
        <div class="container mx-auto flex justify-between py-2 ">
            <div class="logo ">
                <h2 class="text-xl flex font-bold items-center ">English <img src="assets/logo.png" alt="English Janala"> <span class="bangla-font">জানালা</span></h2>
            </div>
            <div class="md:flex gap-4 hidden ">
                <button class="btn btn-outline btn-primary"><i class="fa-regular fa-circle-question"></i>FAQ</button>
                <button class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i>Lesson</button>
                <button class="btn btn-outline btn-primary"><i class="fa-solid fa-arrow-right-from-bracket"></i>Log out</button>
            </div>
        </div>
      
     </header>
     <main>
          <section class=" container mx-auto md:flex justify-between ">
                       <div class="img order-1 md:order-2">
                <img src="assets/hero-student.png" alt="">
            </div>
            <div class="textSection py-52 flex flex-col justify-center items-center md:items-start order-2 md:order-1">
                <h1 class="text-5xl  font-bold mb-10 md:text-center" ><span class="text-sky-400">English</span> is Easy</h1>
                 <p class="bangla-font leading-8 font-bold text-stone-600 text-center md:text-left">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা  আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ</p>

            </div>
 
          </section>
          <section class=" container mx-auto flex flex-col justify-center" >
                <h2 class="text-4xl font-bold text-center"><span class="text-sky-400">Let`s</span> Learn Vocabulary</h2>
          </section>
     </main>
</body>
</html>
